<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Prefilled Fields</title></head>
<body>
<h1>Prefilled Form</h1>
<div class="field">
  <label for="pf-first">First Name</label>
  <input id="pf-first" type="text" value="UserTyped" />
</div>
<div class="field">
  <label for="pf-email">Email</label>
  <input id="pf-email" type="email" value="user@example.com" />
</div>
<div class="field">
  <label for="pf-empty">Phone</label>
  <input id="pf-empty" type="tel" value="" />
</div>
</body>
</html>
