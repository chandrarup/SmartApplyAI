<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Native Select</title></head>
<body>
<h1>Native Dropdown</h1>
<div class="field">
  <label for="state-native">State</label>
  <select id="state-native" name="state">
    <option value="">Select...</option>
    <option value="TX">Texas</option>
    <option value="CA">California</option>
    <option value="WA">Washington</option>
  </select>
</div>
<div class="field">
  <label for="country-native">Country</label>
  <select id="country-native" name="country">
    <option value="">Select...</option>
    <option value="US">United States</option>
    <option value="CA">Canada</option>
  </select>
</div>
</body>
</html>
