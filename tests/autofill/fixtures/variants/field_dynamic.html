<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Dynamic Fields</title></head>
<body>
<h1>Dynamic Form</h1>
<form id="f">
  <div class="field"><label for="static-first">First Name</label><input id="static-first" type="text" /></div>
</form>
<script>
  setTimeout(() => {
    const wrap = document.createElement("div");
    wrap.className = "field";
    wrap.innerHTML = '<label for="dyn-last">Last Name</label><input id="dyn-last" type="text" />';
    document.getElementById("f").appendChild(wrap);
  }, 600);
</script>
</body>
</html>
