  <meta name="description" content="We&#39;re looking for a Geospatial Data Engineering Intern to help build and scale our geospatial data infrastructure over the summer. This role is designed for a junior or senior undergraduate with at least one prior internship under their belt, strong data engineering instincts, and the team awareness to ship work in a shared production codebase. You&#39;ll get hands-on experience building pipelines that ingest, transform, and serve geospatial data with exposure to AI agent tooling along the way. This role begins as a full-time, 3-month summer internship and then continues part-time through September.

You&#39;ll work directly with our data team, contributing to operational infrastructure that powers geospatial analysis and decision-making across the organization. Your primary focus will be building reliable, well-documented data pipelines with a geospatial backbone, while getting meaningful exposure to applied AI systems and helping us complete an in-flight migration from Airflow 2 to Airflow 3.

About your role at Ready ⚡️

You’ll spend the majority of your time on geospatial data engineering, with supporting work in geospatial analysis and applied AI.

Geospatial Data Engineering (Primary Focus)

 - Build and improve Airflow ELT pipelines that ingest, transform, and serve geospatial datasets at scale, working across both our Airflow 2 and Airflow 3 repositories and actively assisting with the Airflow 2 to 3 migration, including porting DAGs, validating parity, and helping retire legacy pipelines

 - Write clean, type-hinted Python and well-structured SQL, including geospatial operations (PostGIS, spatial joins, CRS management) against Athena (Trino), PostgreSQL, Redshift and duckdb

 - Develop modular dbt models with semantic layer definitions and documented business logic for geospatial tables

 - Contribute to data quality systems, including schema validation, freshness monitoring, and spatial integrity checks

 - Support DataHub adoption through schema documentation, lineage tracking, and metadata management for geospatial assets

 - Triage failing DAG runs, read Airflow task logs, and own fixes end-to-end

 - Communicate progress through documentation, code reviews, and regular updates

GeoData Science (Supporting Research)

 - Contribute to research-oriented analyses such as tree canopy classification, network resiliency analysis, and spatial feature extraction

 - Design and document reproducible analytical workflows that feed into production pipelines

 - Translate complex geospatial methods into clear, accessible outputs for non-technical stakeholders

 - Share learnings on emerging GeoAI methods and geospatial tooling with the team

AI Engineering (Applied Exposure)

 - Assist with building data agents using tools like LangGraph, LangChain, or Bedrock Agent Core

 - Support development and iteration on pipelines and text-to-SQL approaches for natural-language data access

 - Contribute to MCP server development and agent evaluation as needed

 - Document agent failure modes and help refine prompts based on feedback

A bit about you 🥇

 - Currently a junior or senior undergraduate (or higher) in Computer Science, Data Science, GIS, Geospatial Engineering, Software Engineering, or a related field

 - At least one prior internship (or equivalent team-based engineering experience); you&#39;ve shipped code in a shared repo, taken a code review, and worked a ticket end-to-end

 - Available to work full-time for 3 months during the summer, then part-time through the fall semester

 - Strong fundamentals in Python, including classes, inheritance, decorators, type hints, and explicit imports

 - Strong fundamentals in SQL: joins, CTEs, window functions, and aggregations

 - Comfortable working in Git/GitHub with a dev → main PR-to-deploy workflow

 - Comfortable on the Unix command line or eager to learn (bash, navigating a filesystem, running scripts)

 - Familiarity with geospatial concepts (CRS, spatial joins, indexing) and tooling such as PostGIS, GeoPandas, or QGIS is a plus

 - Exposure to AWS or similar cloud providers; ideally S3, IAM, Athena, Glue, ECS, or Redshift

 - Experience with Airflow or similar orchestration tools is a plus (or strong eagerness to learn quickly. You&#39;ll be ramping on two versions in parallel and contributing directly to our migration effort)

 - Familiarity with dbt, Pandas, or Parquet/columnar data is a plus

 - Exposure to AI agent architectures (e.g., ReAct) and protocols (A2A, MCP, AG-UI) is a plus

About Ready 🚀

 - Creative problem solvers approaching a legacy industry with a new point of view

 - Humble but ambitious, knowledgeable but curious, persistent but not obnoxious

 - Concise and effective in written and spoken communication

 - Comfortable working remotely

 - One team, one dream

About what you get…

 - Competitive hourly wage - $35-$40 per hour

 - 100% remote work from home

 - Opportunities to learn and grow – all things startups

 - A chance to play a role in defining the roadmap as we pursue a bold vision and and a big goal

 - Work from (almost) anywhere. Ready is a remote-first company, but for security and compliance reasons, employees are not permitted to work from China (excluding Hong Kong, Macau, and Taiwan), Russia, Iran, or North Korea. These restrictions are in place to protect our systems, data, and intellectual property.

 - To get away - we all convene 1-2x a year for [optional, encouraged] retreats

 - The charter to realize a market that is set to receive $65 billion in grant funding across the United States" />

oreMultipleBrandsFeedFiltering","ShowOfferVersionHistory","ApprovalNotesPerApprover","HrisPreferApplicationResume","AmplitudeSDK","ApprovalNotesFromEmail","CreditManagementV2","NewEmailSync","ReadCreditUsageFromBillingDb","ADPRegionSettings","PublicApiApplicationListBatchArchivedAt","CustomAccessRolesSupportMode","EagerLoadInterviewEventsApplicationChain","ProcessEngineUseExecutionIdCache","AiCustomAgents","InAtsSourcing","InAtsSourcingUserAccess","SlackAssistant","DsInfoRedesign"],"allowJobPostIndexing":true,"isDemoOrg":false,"theme":{"colors":{"version":"1","colorPrimary600":"#8676FF","colorPrimary900":"#14142B"},"showJobFilters":true,"showLocationAddress":false,"showTeams":false,"showAutofillApplicationsBox":true,"logoWordmarkImageUrl":"https://app.ashbyhq.com/api/images/org-theme-wordmark/8fdce3d2-92a9-452b-bffc-06b19f931e06/e4d813d2-4035-4bad-acd6-560976697f79/c348066c-26e5-41d7-b026-1234ae43584e.png","logoSquareImageUrl":"https://app.ashbyhq.com/api/images/org-theme-logo/8fdce3d2-92a9-452b-bffc-06b19f931e06/e4d813d2-4035-4bad-acd6-560976697f79/5f195783-22d7-4686-a8c0-4b2cdc6cbdc2.png","applicationSubmittedSuccessMessage":"Thank you for your submission. We'll reach out if there are next steps.","jobBoardTopDescriptionHtml":null,"jobBoardBottomDescriptionHtml":null,"jobPostingBackUrl":null},"appConfirmationTrackingPixelHtml":null,"recruitingPrivacyPolicyUrl":null,"timezone":"America/Los_Angeles","candidateScheduleCancellationReasonRequirementStatus":"Off","showCookieBanner":false},"posting":{"id":"3db71e58-063f-461b-bf90-edf08dd53264","title":"Data Intern","updatedAt":"2026-05-08T16:27:20.750Z","departmentName":"Engineering","departmentExternalName":"Engineering","teamName":"Engineering","teamExternalName":"Engineering","teamNames":["Engineering"],"locationName":"Remote","locationExternalName":"Remote","isListed":true,"suppressDescriptionOpening":false,"suppressDescriptionClosing":false,"descriptionHtml":"<p style=\"min-height:1.5em\">We're looking for a Geospatial Data Engineering Intern to help build and scale our geospatial data infrastructure over the summer. This role is designed for a junior or senior undergraduate with at least one prior internship under their belt, strong data engineering instincts, and the team awareness to ship work in a shared production codebase. You'll get hands-on experience building pipelines that ingest, transform, and serve geospatial data with exposure to AI agent tooling along the way. This role begins as a <strong>full-time, 3-month summer internship</strong> and then continues <strong>part-time through September</strong>.</p><p style=\"min-height:1.5em\">You'll work directly with our data team, contributing to operational infrastructure that powers geospatial analysis and decision-making across the organization. Your primary focus will be building reliable, well-documented data pipelines with a geospatial backbone, while getting meaningful exposure to applied AI systems and helping us complete an in-flight migration from Airflow 2 to Airflow 3.</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>About your role at Ready ⚡️</strong></p><p style=\"min-height:1.5em\">You’ll spend the majority of your time on geospatial data engineering, with supporting work in geospatial analysis and applied AI.</p><p style=\"min-height:1.5em\"><strong>Geospatial Data Engineering (Primary Focus)</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Build and improve Airflow ELT pipelines that ingest, transform, and serve geospatial datasets at scale, working across both our Airflow 2 and Airflow 3 repositories and actively assisting with the Airflow 2 to 3 migration, including porting DAGs, validating parity, and helping retire legacy pipelines</p></li><li><p style=\"min-height:1.5em\">Write clean, type-hinted Python and well-structured SQL, including geospatial operations (PostGIS, spatial joins, CRS management) against Athena (Trino), PostgreSQL, Redshift and duckdb</p></li><li><p style=\"min-height:1.5em\">Develop modular dbt models with semantic layer definitions and documented business logic for geospatial tables</p></li><li><p style=\"min-height:1.5em\">Contribute to data quality systems, including schema validation, freshness monitoring, and spatial integrity checks</p></li><li><p style=\"min-height:1.5em\">Support DataHub adoption through schema documentation, lineage tracking, and metadata management for geospatial assets</p></li><li><p style=\"min-height:1.5em\">Triage failing DAG runs, read Airflow task logs, and own fixes end-to-end</p></li><li><p style=\"min-height:1.5em\">Communicate progress through documentation, code reviews, and regular updates</p></li></ul><p style=\"min-height:1.5em\"><strong>GeoData Science (Supporting Research)</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Contribute to research-oriented analyses such as tree canopy classification, network resiliency analysis, and spatial feature extraction</p></li><li><p style=\"min-height:1.5em\">Design and document reproducible analytical workflows that feed into production pipelines</p></li><li><p style=\"min-height:1.5em\">Translate complex geospatial methods into clear, accessible outputs for non-technical stakeholders</p></li><li><p style=\"min-height:1.5em\">Share learnings on emerging GeoAI methods and geospatial tooling with the team</p></li></ul><p style=\"min-height:1.5em\"><strong>AI Engineering (Applied Exposure)</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Assist with building data agents using tools like LangGraph, LangChain, or Bedrock Agent Core</p></li><li><p style=\"min-height:1.5em\">Support development and iteration on pipelines and text-to-SQL approaches for natural-language data access</p></li><li><p style=\"min-height:1.5em\">Contribute to MCP server development and agent evaluation as needed</p></li><li><p style=\"min-height:1.5em\">Document agent failure modes and help refine prompts based on feedback</p></li></ul><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>A bit about you 🥇</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Currently a junior or senior undergraduate (or higher) in Computer Science, Data Science, GIS, Geospatial Engineering, Software Engineering, or a related field</p></li><li><p style=\"min-height:1.5em\">At least one prior internship (or equivalent team-based engineering experience); you've shipped code in a shared repo, taken a code review, and worked a ticket end-to-end</p></li><li><p style=\"min-height:1.5em\">Available to work full-time for 3 months during the summer, then part-time through the fall semester</p></li><li><p style=\"min-height:1.5em\">Strong fundamentals in Python, including classes, inheritance, decorators, type hints, and explicit imports</p></li><li><p style=\"min-height:1.5em\">Strong fundamentals in SQL:  joins, CTEs, window functions, and aggregations</p></li><li><p style=\"min-height:1.5em\">Comfortable working in Git/GitHub with a dev → main PR-to-deploy workflow</p></li><li><p style=\"min-height:1.5em\">Comfortable on the Unix command line or eager to learn (bash, navigating a filesystem, running scripts)</p></li><li><p style=\"min-height:1.5em\">Familiarity with geospatial concepts (CRS, spatial joins, indexing) and tooling such as PostGIS, GeoPandas, or QGIS is a plus</p></li><li><p style=\"min-height:1.5em\">Exposure to AWS or similar cloud providers; ideally S3, IAM, Athena, Glue, ECS, or Redshift</p></li><li><p style=\"min-height:1.5em\">Experience with Airflow or similar orchestration tools is a plus (or strong eagerness to learn quickly. You'll be ramping on two versions in parallel and contributing directly to our migration effort)</p></li><li><p style=\"min-height:1.5em\">Familiarity with dbt, Pandas, or Parquet/columnar data is a plus</p></li><li><p style=\"min-height:1.5em\">Exposure to AI agent architectures (e.g., ReAct) and protocols (A2A, MCP, AG-UI) is a plus</p></li></ul><p style=\"min-height:1.5em\"><strong>About Ready</strong> 🚀</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Creative problem solvers approaching a legacy industry with a new point of view</p></li><li><p style=\"min-height:1.5em\">Humble but ambitious, knowledgeable but curious, persistent but not obnoxious</p></li><li><p style=\"min-height:1.5em\">Concise and effective in written and spoken communication</p></li><li><p style=\"min-height:1.5em\">Comfortable working remotely</p></li><li><p style=\"min-height:1.5em\">One team, one dream</p></li></ul><p style=\"min-height:1.5em\"><strong>About what you get…</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Competitive hourly wage - $35-$40 per hour</p></li><li><p style=\"min-height:1.5em\">100% remote work from home</p></li><li><p style=\"min-height:1.5em\">Opportunities to learn and grow – all things startups</p></li><li><p style=\"min-height:1.5em\">A chance to play a role in defining the roadmap as we pursue a bold vision and and a big goal</p></li><li><p style=\"min-height:1.5em\">Work from (almost) anywhere. Ready is a remote-first company, but for security and compliance reasons, employees are not permitted to work from China (excluding Hong Kong, Macau, and Taiwan), Russia, Iran, or North Korea. These restrictions are in place to protect our systems, data, and intellectual property.</p></li><li><p style=\"min-height:1.5em\">To get away - we all convene 1-2x a year for [optional, encouraged] retreats</p></li><li><p style=\"min-height:1.5em\">The charter to realize a market that is set to receive $65 billion in grant funding across the United States</p></li></ul>","descriptionPlainText":"We're looking for a Geospatial Data Engineering Intern to help build and scale our geospatial data infrastructure over the summer. This role is designed for a junior or senior undergraduate with at least one prior internship under their belt, strong data engineering instincts, and the team awareness to ship work in a shared production codebase. You'll get hands-on experience building pipelines that ingest, transform, and serve geospatial data with exposure to AI agent tooling along the way. This role begins as a full-time, 3-month summer internship and then continues part-time through September.\n\nYou'll work directly with our data team, contributing to operational infrastructure that powers geospatial analysis and decision-making across the organization. Your primary focus will be building reliable, well-documented data pipelines with a geospatial backbone, while getting meaningful exposure to applied AI systems and helping us complete an in-flight migration from Airflow 2 to Airflow 3.\n\nAbout your role at Ready ⚡️\n\nYou’ll spend the majority of your time on geospatial data engineering, with supporting work in geospatial analysis and applied AI.\n\nGeospatial Data Engineering (Primary Focus)\n\n - Build and improve Airflow ELT pipelines that ingest, transform, and serve geospatial datasets at scale, working across both our Airflow 2 and Airflow 3 repositories and actively assisting with the Airflow 2 to 3 migration, including porting DAGs, validating parity, and helping retire legacy pipelines\n\n - Write clean, type-hinted Python and well-structured SQL, including geospatial operations (PostGIS, spatial joins, CRS management) against Athena (Trino), PostgreSQL, Redshift and duckdb\n\n - Develop modular dbt models with semantic layer definitions and documented business logic for geospatial tables\n\n - Contribute to data quality systems, including schema validation, freshness monitoring, and spatial integrity checks\n\n - Support DataHub adoption through schema documentation, lineage tracking, and metadata management for geospatial assets\n\n - Triage failing DAG runs, read Airflow task logs, and own fixes end-to-end\n\n - Communicate progress through documentation, code reviews, and regular updates\n\nGeoData Science (Supporting Research)\n\n - Contribute to research-oriented analyses such as tree canopy classification, network resiliency analysis, and spatial feature extraction\n\n - Design and document reproducible analytical workflows that feed into production pipelines\n\n - Translate complex geospatial methods into clear, accessible outputs for non-technical stakeholders\n\n - Share learnings on emerging GeoAI methods and geospatial tooling with the team\n\nAI Engineering (Applied Exposure)\n\n - Assist with building data agents using tools like LangGraph, LangChain, or Bedrock Agent Core\n\n - Support development and iteration on pipelines and text-to-SQL approaches for natural-language data access\n\n - Contribute to MCP server development and agent evaluation as needed\n\n - Document agent failure modes and help refine prompts based on feedback\n\nA bit about you 🥇\n\n - Currently a junior or senior undergraduate (or higher) in Computer Science, Data Science, GIS, Geospatial Engineering, Software Engineering, or a related field\n\n - At least one prior internship (or equivalent team-based engineering experience); you've shipped code in a shared repo, taken a code review, and worked a ticket end-to-end\n\n - Available to work full-time for 3 months during the summer, then part-time through the fall semester\n\n - Strong fundamentals in Python, including classes, inheritance, decorators, type hints, and explicit imports\n\n - Strong fundamentals in SQL: joins, CTEs, window functions, and aggregations\n\n - Comfortable working in Git/GitHub with a dev → main PR-to-deploy workflow\n\n - Comfortable on the Unix command line or eager to learn (bash, navigating a filesystem, running scripts)\n\n - Familiarity with geospatial concepts (CRS, spatial joins, indexing) and tooling such as PostGIS, GeoPandas, or QGIS is a plus\n\n - Exposure to AWS or similar cloud providers; ideally S3, IAM, Athena, Glue, ECS, or Redshift\n\n - Experience with Airflow or similar orchestration tools is a plus (or strong eagerness to learn quickly. You'll be ramping on two versions in parallel and contributing directly to our migration effort)\n\n - Familiarity with dbt, Pandas, or Parquet/columnar data is a plus\n\n - Exposure to AI agent architectures (e.g., ReAct) and protocols (A2A, MCP, AG-UI) is a plus\n\nAbout Ready 🚀\n\n - Creative problem solvers approaching a legacy industry with a new point of view\n\n - Humble but ambitious, knowledgeable but curious, persistent but not obnoxious\n\n - Concise and effective in written and spoken communication\n\n - Comfortable working remotely\n\n - One team, one dream\n\nAbout what you get…\n\n - Competitive hourly wage - $35-$40 per hour\n\n - 100% remote work from home\n\n - Opportunities to learn and grow – all things startups\n\n - A chance to play a role in defining the roadmap as we pursue a bold vision and and a big goal\n\n - Work from (almost) anywhere. Ready is a remote-first company, but for security and compliance reasons, employees are not permitted to work from China (excluding Hong Kong, Macau, and Taiwan), Russia, Iran, or North Korea. These restrictions are in place to protect our systems, data, and intellectual property.\n\n - To get away - we all convene 1-2x a year for [optional, encouraged] retreats\n\n - The charter to realize a market that is set to receive $65 billion in grant funding across the United States","descriptionParts":{"descriptionOpening":null,"descriptionBody":{"html":"<p style=\"min-height:1.5em\">We're looking for a Geospatial Data Engineering Intern to help build and scale our geospatial data infrastructure over the summer. This role is designed for a junior or senior undergraduate with at least one prior internship under their belt, strong data engineering instincts, and the team awareness to ship work in a shared production codebase. You'll get hands-on experience building pipelines that ingest, transform, and serve geospatial data with exposure to AI agent tooling along the way. This role begins as a <strong>full-time, 3-month summer internship</strong> and then continues <strong>part-time through September</strong>.</p><p style=\"min-height:1.5em\">You'll work directly with our data team, contributing to operational infrastructure that powers geospatial analysis and decision-making across the organization. Your primary focus will be building reliable, well-documented data pipelines with a geospatial backbone, while getting meaningful exposure to applied AI systems and helping us complete an in-flight migration from Airflow 2 to Airflow 3.</p><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>About your role at Ready ⚡️</strong></p><p style=\"min-height:1.5em\">You’ll spend the majority of your time on geospatial data engineering, with supporting work in geospatial analysis and applied AI.</p><p style=\"min-height:1.5em\"><strong>Geospatial Data Engineering (Primary Focus)</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Build and improve Airflow ELT pipelines that ingest, transform, and serve geospatial datasets at scale, working across both our Airflow 2 and Airflow 3 repositories and actively assisting with the Airflow 2 to 3 migration, including porting DAGs, validating parity, and helping retire legacy pipelines</p></li><li><p style=\"min-height:1.5em\">Write clean, type-hinted Python and well-structured SQL, including geospatial operations (PostGIS, spatial joins, CRS management) against Athena (Trino), PostgreSQL, Redshift and duckdb</p></li><li><p style=\"min-height:1.5em\">Develop modular dbt models with semantic layer definitions and documented business logic for geospatial tables</p></li><li><p style=\"min-height:1.5em\">Contribute to data quality systems, including schema validation, freshness monitoring, and spatial integrity checks</p></li><li><p style=\"min-height:1.5em\">Support DataHub adoption through schema documentation, lineage tracking, and metadata management for geospatial assets</p></li><li><p style=\"min-height:1.5em\">Triage failing DAG runs, read Airflow task logs, and own fixes end-to-end</p></li><li><p style=\"min-height:1.5em\">Communicate progress through documentation, code reviews, and regular updates</p></li></ul><p style=\"min-height:1.5em\"><strong>GeoData Science (Supporting Research)</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Contribute to research-oriented analyses such as tree canopy classification, network resiliency analysis, and spatial feature extraction</p></li><li><p style=\"min-height:1.5em\">Design and document reproducible analytical workflows that feed into production pipelines</p></li><li><p style=\"min-height:1.5em\">Translate complex geospatial methods into clear, accessible outputs for non-technical stakeholders</p></li><li><p style=\"min-height:1.5em\">Share learnings on emerging GeoAI methods and geospatial tooling with the team</p></li></ul><p style=\"min-height:1.5em\"><strong>AI Engineering (Applied Exposure)</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Assist with building data agents using tools like LangGraph, LangChain, or Bedrock Agent Core</p></li><li><p style=\"min-height:1.5em\">Support development and iteration on pipelines and text-to-SQL approaches for natural-language data access</p></li><li><p style=\"min-height:1.5em\">Contribute to MCP server development and agent evaluation as needed</p></li><li><p style=\"min-height:1.5em\">Document agent failure modes and help refine prompts based on feedback</p></li></ul><p style=\"min-height:1.5em\"></p><p style=\"min-height:1.5em\"><strong>A bit about you 🥇</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Currently a junior or senior undergraduate (or higher) in Computer Science, Data Science, GIS, Geospatial Engineering, Software Engineering, or a related field</p></li><li><p style=\"min-height:1.5em\">At least one prior internship (or equivalent team-based engineering experience); you've shipped code in a shared repo, taken a code review, and worked a ticket end-to-end</p></li><li><p style=\"min-height:1.5em\">Available to work full-time for 3 months during the summer, then part-time through the fall semester</p></li><li><p style=\"min-height:1.5em\">Strong fundamentals in Python, including classes, inheritance, decorators, type hints, and explicit imports</p></li><li><p style=\"min-height:1.5em\">Strong fundamentals in SQL:  joins, CTEs, window functions, and aggregations</p></li><li><p style=\"min-height:1.5em\">Comfortable working in Git/GitHub with a dev → main PR-to-deploy workflow</p></li><li><p style=\"min-height:1.5em\">Comfortable on the Unix command line or eager to learn (bash, navigating a filesystem, running scripts)</p></li><li><p style=\"min-height:1.5em\">Familiarity with geospatial concepts (CRS, spatial joins, indexing) and tooling such as PostGIS, GeoPandas, or QGIS is a plus</p></li><li><p style=\"min-height:1.5em\">Exposure to AWS or similar cloud providers; ideally S3, IAM, Athena, Glue, ECS, or Redshift</p></li><li><p style=\"min-height:1.5em\">Experience with Airflow or similar orchestration tools is a plus (or strong eagerness to learn quickly. You'll be ramping on two versions in parallel and contributing directly to our migration effort)</p></li><li><p style=\"min-height:1.5em\">Familiarity with dbt, Pandas, or Parquet/columnar data is a plus</p></li><li><p style=\"min-height:1.5em\">Exposure to AI agent architectures (e.g., ReAct) and protocols (A2A, MCP, AG-UI) is a plus</p></li></ul><p style=\"min-height:1.5em\"><strong>About Ready</strong> 🚀</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Creative problem solvers approaching a legacy industry with a new point of view</p></li><li><p style=\"min-height:1.5em\">Humble but ambitious, knowledgeable but curious, persistent but not obnoxious</p></li><li><p style=\"min-height:1.5em\">Concise and effective in written and spoken communication</p></li><li><p style=\"min-height:1.5em\">Comfortable working remotely</p></li><li><p style=\"min-height:1.5em\">One team, one dream</p></li></ul><p style=\"min-height:1.5em\"><strong>About what you get…</strong></p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Competitive hourly wage - $35-$40 per hour</p></li><li><p style=\"min-height:1.5em\">100% remote work from home</p></li><li><p style=\"min-height:1.5em\">Opportunities to learn and grow – all things startups</p></li><li><p style=\"min-height:1.5em\">A chance to play a role in defining the roadmap as we pursue a bold vision and and a big goal</p></li><li><p style=\"min-height:1.5em\">Work from (almost) anywhere. Ready is a remote-first company, but for security and compliance reasons, employees are not permitted to work from China (excluding Hong Kong, Macau, and Taiwan), Russia, Iran, or North Korea. These restrictions are in place to protect our systems, data, and intellectual property.</p></li><li><p style=\"min-height:1.5em\">To get away - we all convene 1-2x a year for [optional, encouraged] retreats</p></li><li><p style=\"min-height:1.5em\">The charter to realize a market that is set to receive $65 billion in grant funding across the United States</p></li></ul>","plain":"We're looking for a Geospatial Data Engineering Intern to help build and scale our geospatial data infrastructure over the summer. This role is designed for a junior or senior undergraduate with at least one prior internship under their belt, strong data engineering instincts, and the team awareness to ship work in a shared production codebase. You'll get hands-on experience building pipelines that ingest, transform, and serve geospatial data with exposure to AI agent tooling along the way. This role begins as a full-time, 3-month summer internship and then continues part-time through September.\n\nYou'll work directly with our data team, contributing to operational infrastructure that powers geospatial analysis and decision-making across the organization. Your primary focus will be building reliable, well-documented data pipelines with a geospatial backbone, while getting meaningful exposure to applied AI systems and helping us complete an in-flight migration from Airflow 2 to Airflow 3.\n\nAbout your role at Ready ⚡️\n\nYou’ll spend the majority of your time on geospatial data engineering, with supporting work in geospatial analysis and applied AI.\n\nGeospatial Data Engineering (Primary Focus)\n\n - Build and improve Airflow ELT pipelines that ingest, transform, and serve geospatial datasets at scale, working across both our Airflow 2 and Airflow 3 repositories and actively assisting with the Airflow 2 to 3 migration, including porting DAGs, validating parity, and helping retire legacy pipelines\n\n - Write clean, type-hinted Python and well-structured SQL, including geospatial operations (PostGIS, spatial joins, CRS management) against Athena (Trino), PostgreSQL, Redshift and duckdb\n\n - Develop modular dbt models with semantic layer definitions and documented business logic for geospatial tables\n\n - Contribute to data quality systems, including schema validation, freshness monitoring, and spatial integrity checks\n\n - Support DataHub adoption through schema documentation, lineage tracking, and metadata management for geospatial assets\n\n - Triage failing DAG runs, read Airflow task logs, and own fixes end-to-end\n\n - Communicate progress through documentation, code reviews, and regular updates\n\nGeoData Science (Supporting Research)\n\n - Contribute to research-oriented analyses such as tree canopy classification, network resiliency analysis, and spatial feature extraction\n\n - Design and document reproducible analytical workflows that feed into production pipelines\n\n - Translate complex geospatial methods into clear, accessible outputs for non-technical stakeholders\n\n - Share learnings on emerging GeoAI methods and geospatial tooling with the team\n\nAI Engineering (Applied Exposure)\n\n - Assist with building data agents using tools like LangGraph, LangChain, or Bedrock Agent Core\n\n - Support development and iteration on pipelines and text-to-SQL approaches for natural-language data access\n\n - Contribute to MCP server development and agent evaluation as needed\n\n - Document agent failure modes and help refine prompts based on feedback\n\nA bit about you 🥇\n\n - Currently a junior or senior undergraduate (or higher) in Computer Science, Data Science, GIS, Geospatial Engineering, Software Engineering, or a related field\n\n - At least one prior internship (or equivalent team-based engineering experience); you've shipped code in a shared repo, taken a code review, and worked a ticket end-to-end\n\n - Available to work full-time for 3 months during the summer, then part-time through the fall semester\n\n - Strong fundamentals in Python, including classes, inheritance, decorators, type hints, and explicit imports\n\n - Strong fundamentals in SQL: joins, CTEs, window functions, and aggregations\n\n - Comfortable working in Git/GitHub with a dev → main PR-to-deploy workflow\n\n - Comfortable on the Unix command line or eager to learn (bash, navigating a filesystem, running scripts)\n\n - Familiarity with geospatial concepts (CRS, spatial joins, indexing) and tooling such as PostGIS, GeoPandas, or QGIS is a plus\n\n - Exposure to AWS or similar cloud providers; ideally S3, IAM, Athena, Glue, ECS, or Redshift\n\n - Experience with Airflow or similar orchestration tools is a plus (or strong eagerness to learn quickly. You'll be ramping on two versions in parallel and contributing directly to our migration effort)\n\n - Familiarity with dbt, Pandas, or Parquet/columnar data is a plus\n\n - Exposure to AI agent architectures (e.g., ReAct) and protocols (A2A, MCP, AG-UI) is a plus\n\nAbout Ready 🚀\n\n - Creative problem solvers approaching a legacy industry with a new point of view\n\n - Humble but ambitious, knowledgeable but curious, persistent but not obnoxious\n\n - Concise and effective in written and spoken communication\n\n - Comfortable working remotely\n\n - One team, one dream\n\nAbout what you get…\n\n - Competitive hourly wage - $35-$40 per hour\n\n - 100% remote work from home\n\n - Opportunities to learn and grow – all things startups\n\n - A chance to play a role in defining the roadmap as we pursue a bold vision and and a big goal\n\n - Work from (almost) anywhere. Ready is a remote-first company, but for security and compliance reasons, employees are not permitted to work from China (excluding Hong Kong, Macau, and Taiwan), Russia, Iran, or North Korea. These restrictions are in place to protect our systems, data, and intellectual property.\n\n - To get away - we all convene 1-2x a year for [optional, encouraged] retreats\n\n - The charter to realize a market that is set to receive $65 billion in grant funding across the United States"},"descriptionClosing":null},"shortDescription":null,"applicationFormDefinitionId":null,"surveyFormDefinitionIds":[],"linkedData":{"@context":"https://schema.org/","@type":"JobPosting","title":"Data Intern","description":"<p style=\"min-height:1.5em\">We're looking for a Geospatial Data Engineering Intern to help build and scale our geospatial data infrastructure over the summer. This role is designed for a junior or senior undergraduate with at least one prior internship under their belt, strong data engineering instincts, and the team awareness to ship work in a shared production codebase. You'll get hands-on experience building pipelines that ingest, transform, and serve geospatial data with exposure to AI agent tooling along the way. This role begins as a <strong>full-time, 3-month summer internship</strong> and then continues <strong>part-time through September</strong>.</p><p style=\"min-height:1.5em\">You'll work directly with our data team, contributing to o
