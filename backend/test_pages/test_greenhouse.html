<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Software Engineer - Greenhouse Test | TechCorp</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 0 auto; padding: 32px 24px; color: #1a1a2e; background: #f9fafb; }
  .greenhouse-header { background: #24a047; color: white; padding: 20px 28px; border-radius: 10px; margin-bottom: 28px; }
  .greenhouse-header h1 { margin: 0 0 4px; font-size: 22px; }
  .greenhouse-header p { margin: 0; opacity: 0.85; font-size: 14px; }
  .form-section { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 24px; margin-bottom: 20px; }
  .form-section h2 { font-size: 14px; font-weight: 700; color: #24a047; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 18px; border-bottom: 2px solid #e8f5ec; padding-bottom: 8px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row.full { grid-template-columns: 1fr; }
  .field-group { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 13px; font-weight: 600; color: #374151; }
  label .req { color: #dc2626; }
  input[type=text], input[type=email], input[type=tel], input[type=url], input[type=number], select, textarea {
    padding: 9px 12px; border: 1.5px solid #d1d5db; border-radius: 7px; font-size: 14px; outline: none; width: 100%; box-sizing: border-box; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: #24a047; box-shadow: 0 0 0 3px rgba(36,160,71,0.1); }
  textarea { resize: vertical; min-height: 90px; }
  .submit-btn { background: #24a047; color: white; border: none; padding: 12px 32px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .submit-btn:hover { background: #1a7a36; }
  .badge { display: inline-block; background: #e8f5ec; color: #166534; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
  .result-overlay { display: none; position: fixed; top: 20px; right: 20px; background: white; border: 2px solid #24a047; border-radius: 10px; padding: 16px 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); max-width: 320px; z-index: 9999; font-size: 13px; }
  .result-overlay h3 { margin: 0 0 10px; color: #24a047; font-size: 14px; }
  .result-item { padding: 3px 0; border-bottom: 1px solid #f0f0f0; }
  .result-item:last-child { border: none; }
  .close-btn { float: right; background: none; border: none; font-size: 16px; cursor: pointer; color: #666; margin-top: -4px; }
</style>
</head>
<body>

<div class="greenhouse-header">
  <h1>Software Engineer — AI Platform</h1>
  <p>TechCorp · San Francisco, CA · Full-time · $130k–$170k</p>
</div>

<div class="badge">Greenhouse ATS — LocalHire Agent Test Page</div>

<form id="greenhouse-form">

  <div class="form-section">
    <h2>Personal Information</h2>
    <div class="form-row">
      <div class="field-group">
        <label for="first_name">First Name <span class="req">*</span></label>
        <input type="text" id="first_name" name="first_name" data-field="First Name" autocomplete="off">
      </div>
      <div class="field-group">
        <label for="last_name">Last Name <span class="req">*</span></label>
        <input type="text" id="last_name" name="last_name" data-field="Last Name" autocomplete="off">
      </div>
    </div>
    <div class="form-row">
      <div class="field-group">
        <label for="email">Email Address <span class="req">*</span></label>
        <input type="email" id="email" name="email" data-field="Email Address" autocomplete="off">
      </div>
      <div class="field-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" data-field="Phone Number" autocomplete="off">
      </div>
    </div>
    <div class="form-row">
      <div class="field-group">
        <label for="city">City</label>
        <input type="text" id="city" name="city" data-field="City" autocomplete="off">
      </div>
      <div class="field-group">
        <label for="state">State / Province</label>
        <input type="text" id="state" name="state" data-field="State / Province" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="form-section">
    <h2>Professional Details</h2>
    <div class="form-row">
      <div class="field-group">
        <label for="linkedin">LinkedIn Profile URL</label>
        <input type="url" id="linkedin" name="linkedin" data-field="LinkedIn Profile URL" autocomplete="off">
      </div>
      <div class="field-group">
        <label for="github">GitHub URL</label>
        <input type="url" id="github" name="github" data-field="GitHub URL" autocomplete="off">
      </div>
    </div>
    <div class="form-row">
      <div class="field-group">
        <label for="current_company">Current Company</label>
        <input type="text" id="current_company" name="current_company" data-field="Current Company" autocomplete="off">
      </div>
      <div class="field-group">
        <label for="current_title">Current Job Title</label>
        <input type="text" id="current_title" name="current_title" data-field="Current Job Title" autocomplete="off">
      </div>
    </div>
    <div class="form-row">
      <div class="field-group">
        <label for="years_exp">Years of Experience</label>
        <input type="number" id="years_exp" name="years_exp" data-field="Years of Experience" autocomplete="off">
      </div>
      <div class="field-group">
        <label for="salary">Desired Salary (USD)</label>
        <input type="text" id="salary" name="salary" data-field="Desired Salary" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="form-section">
    <h2>Application Questions</h2>
    <div class="form-row full">
      <div class="field-group">
        <label for="summary">Tell us about yourself</label>
        <textarea id="summary" name="summary" data-field="Tell us about yourself" rows="4" placeholder="Brief professional summary..."></textarea>
      </div>
    </div>
    <div class="form-row">
      <div class="field-group">
        <label for="work_auth">Are you legally authorized to work in the United States? <span class="req">*</span></label>
        <select id="work_auth" name="work_auth" data-field="Are you legally authorized to work in the United States?">
          <option value="">-- Select --</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="field-group">
        <label for="sponsorship">Will you now or in the future require sponsorship? <span class="req">*</span></label>
        <select id="sponsorship" name="sponsorship" data-field="Will you now or in the future require sponsorship?">
          <option value="">-- Select --</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="field-group">
        <label for="relocate">Are you willing to relocate?</label>
        <select id="relocate" name="relocate" data-field="Are you willing to relocate?">
          <option value="">-- Select --</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
          <option value="Maybe">Maybe</option>
        </select>
      </div>
      <div class="field-group">
        <label for="referral">How did you hear about this position?</label>
        <select id="referral" name="referral" data-field="How did you hear about this position?">
          <option value="">-- Select --</option>
          <option value="LinkedIn">LinkedIn</option>
          <option value="Indeed">Indeed</option>
          <option value="Company Website">Company Website</option>
          <option value="Referral">Referral</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-row full">
      <div class="field-group">
        <label for="why_company">Why do you want to work at TechCorp?</label>
        <textarea id="why_company" name="why_company" data-field="Why do you want to work at TechCorp?" rows="3"></textarea>
      </div>
    </div>
  </div>

  <div class="form-section">
    <h2>Equal Employment Opportunity</h2>
    <div class="form-row">
      <div class="field-group">
        <label for="gender">Gender</label>
        <select id="gender" name="gender" data-field="Gender">
          <option value="">-- Select --</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Non-binary">Non-binary</option>
          <option value="Prefer not to say">Prefer not to say</option>
        </select>
      </div>
      <div class="field-group">
        <label for="veteran">Veteran Status</label>
        <select id="veteran" name="veteran" data-field="Veteran Status">
          <option value="">-- Select --</option>
          <option value="I am not a protected veteran">I am not a protected veteran</option>
          <option value="I identify as one or more classifications">I identify as one or more classifications</option>
          <option value="I prefer not to say">I prefer not to say</option>
        </select>
      </div>
    </div>
  </div>

  <button type="submit" class="submit-btn">Submit Application</button>
</form>

<!-- Results overlay -->
<div class="result-overlay" id="resultOverlay">
  <button class="close-btn" onclick="document.getElementById('resultOverlay').style.display='none'">✕</button>
  <h3>Auto-Fill Results</h3>
  <div id="resultList"></div>
</div>

<script>
// Prevent actual form submission
document.getElementById("greenhouse-form").addEventListener("submit", e => {
  e.preventDefault();
  showFilledValues();
});

function showFilledValues() {
  const fields = document.querySelectorAll("[data-field]");
  const list = document.getElementById("resultList");
  list.innerHTML = "";
  let filled = 0;
  fields.forEach(f => {
    if (f.value) {
      filled++;
      const div = document.createElement("div");
      div.className = "result-item";
      div.innerHTML = `<strong>${f.dataset.field}:</strong> ${f.value.substring(0,60)}${f.value.length>60?"...":""}`;
      list.appendChild(div);
    }
  });
  const summary = document.createElement("div");
  summary.style.cssText = "margin-top:8px;padding-top:8px;border-top:2px solid #e2e8f0;font-weight:700;color:#24a047";
  summary.textContent = `${filled}/${fields.length} fields filled`;
  list.appendChild(summary);
  document.getElementById("resultOverlay").style.display = "block";
}

// Log when fields are filled (useful for seeing extension activity)
document.querySelectorAll("[data-field]").forEach(el => {
  el.addEventListener("change", () => {
    console.log(`[Greenhouse Test] Field changed: "${el.dataset.field}" = "${el.value}"`);
  });
  el.addEventListener("input", () => {
    console.log(`[Greenhouse Test] Field input: "${el.dataset.field}" = "${el.value}"`);
  });
});
</script>
</body>
</html>
