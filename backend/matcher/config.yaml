role_mode: internship
# CLAUDE.md rule 10: 70+ enters the queue; Strong = 85+, Stretch = 70-84
match_threshold: 70
strong_threshold: 85
stretch_threshold: 70
top_recall: 50
top_fit: 30
embedding_model: sentence-transformers/all-MiniLM-L6-v2
rerank_model: BAAI/bge-reranker-base
llm_prefer: ollama
recall_evidence_k: 8
filters_path: backend/scraper/filters.yaml
jobs_db_path: backend/scraper/jobs.db
matches_db_path: backend/matcher/matches.db
# matching-v2 search-string integration
search_alignment_boost: 5
search_bypass_internship: true
enable_legitimacy_web: true

# hybrid deterministic ranking (Phase-2 §3.5)
# When true: prefilter -> job features (FTS5 + embeddings) -> candidate features
# -> 5-component hybrid score over ALL survivors -> top_fit into the unchanged
# LLM fit + 70/85 gate. Set false to fall back to the legacy recall+rerank path.
use_hybrid_ranking: true
features_db_path: backend/matcher/features.db
scoring_version: v1
hybrid_weights:
  skills: 0.40
  bm25: 0.20
  embedding: 0.20
  domain: 0.10
  level: 0.10

