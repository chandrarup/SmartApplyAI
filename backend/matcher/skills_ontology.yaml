# synonyms are matched case-insensitively as \b-bounded literals (see ontology.py).
# Folds backend/scoring.py EQUIVALENCES (ml/dl, llm/rag/fine-tuning, aws/azure,
# vector dbs, ml pipelines) into synonyms + related links.
