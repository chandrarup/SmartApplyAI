<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 380px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 540px; background: #fff; }

    .header { background: linear-gradient(135deg, #007bff, #0056b3); color: white; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; }
    .header-right { display: flex; gap: 6px; align-items: center; }
    .icon-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .icon-btn:hover { background: rgba(255,255,255,0.35); }
    .platform-badge { font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }

    .tabs { display: flex; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; }
    .tab { flex: 1; padding: 9px 4px; text-align: center; cursor: pointer; font-size: 11px; font-weight: 600; color: #666; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.4px; }
    .tab.active { color: #007bff; border-bottom-color: #007bff; background: #fff; }
    .tab:hover:not(.active) { color: #333; background: #f0f0f0; }

    .panel { padding: 14px; flex: 1; overflow-y: auto; display: none; flex-direction: column; gap: 10px; }
    .panel.active { display: flex; }

    .action-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #007bff; color: white; }
    .btn-primary:hover { background: #0056b3; }
    .btn-primary:disabled { background: #a0c4ff; cursor: not-allowed; }
    .btn-success { background: #28a745; color: white; }
    .btn-success:hover { background: #1e7e34; }
    .btn-success:disabled { background: #7ec89b; cursor: not-allowed; }
    .btn-outline { background: white; color: #007bff; border: 1.5px solid #007bff; }
    .btn-outline:hover { background: #f0f7ff; }

    /* Status bar */
    .status-bar { padding: 8px 10px; border-radius: 7px; font-size: 12px; display: flex; align-items: center; gap: 7px; }
    .status-bar.info { background: #e8f4fd; color: #0369a1; }
    .status-bar.success { background: #dcfce7; color: #166534; }
    .status-bar.error { background: #fee2e2; color: #991b1b; }
    .status-bar.warning { background: #fef9c3; color: #854d0e; }
    .status-bar.loading { background: #f3f4f6; color: #374151; }
    .spinner { width: 14px; height: 14px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress */
    .progress-wrap { background: #e9ecef; border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: #007bff; border-radius: 4px; transition: width 0.3s; }

    /* Result card */
    .result-card { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 12px; font-size: 12.5px; }
    .result-card .label { color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .result-card .value { font-weight: 600; color: #1a1a2e; }
    .result-card .score { font-size: 20px; font-weight: 700; color: #007bff; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .tag.green { background: #dcfce7; color: #166534; }
    .tag.red { background: #fee2e2; color: #991b1b; }

    /* Chat */
    #chat-history { height: 200px; overflow-y: auto; border: 1px solid #e9ecef; border-radius: 8px; padding: 8px; background: #fafafa; display: flex; flex-direction: column; gap: 6px; }
    .msg { padding: 7px 10px; border-radius: 10px; font-size: 12.5px; max-width: 85%; line-height: 1.4; }
    .msg.user { background: #dbeafe; color: #1e40af; align-self: flex-end; }
    .msg.bot { background: #f1f5f9; color: #1e293b; align-self: flex-start; }
    .input-row { display: flex; gap: 6px; }
    .input-row input { flex: 1; padding: 7px 10px; border: 1.5px solid #e0e0e0; border-radius: 7px; font-size: 12.5px; outline: none; }
    .input-row input:focus { border-color: #007bff; }
    .send-btn { padding: 7px 12px; background: #007bff; color: white; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; }
    .faq-btn { display: block; width: 100%; padding: 6px 10px; margin: 3px 0; background: #f0f4ff; border: 1px solid #c7d7ff; border-radius: 6px; text-align: left; cursor: pointer; font-size: 12px; color: #3730a3; }
    .faq-btn:hover { background: #e0e7ff; }

    /* Cover letter */
    .cover-letter-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 12px; font-size: 12.5px; line-height: 1.6; color: #1a1a2e; white-space: pre-wrap; max-height: 280px; overflow-y: auto; }
    .copy-btn { background: #6c757d; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .copy-btn:hover { background: #495057; }
    .copy-btn.copied { background: #28a745; }

    /* Autofill log */
    .fill-log { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 8px 12px; font-size: 11.5px; max-height: 150px; overflow-y: auto; color: #374151; }
    .fill-log .entry { padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
    .fill-log .entry:last-child { border-bottom: none; }

    /* Settings */
    .settings-row { display: flex; flex-direction: column; gap: 5px; }
    .settings-row label { font-size: 12px; font-weight: 600; color: #555; }
    .settings-row input { padding: 7px 10px; border: 1.5px solid #e0e0e0; border-radius: 7px; font-size: 12.5px; }
    .settings-row input:focus { border-color: #007bff; outline: none; }

    .hidden { display: none; }
    .divider { border: none; border-top: 1px solid #f0f0f0; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>LocalHire Agent</h1>
      <div id="platformBadge" class="platform-badge">Detecting...</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="refreshBtn" title="Refresh page data">↺</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-panel="panel-match">Match</button>
    <button class="tab" data-panel="panel-autofill">Auto-Fill</button>
    <button class="tab" data-panel="panel-cover">Cover Letter</button>
    <button class="tab" data-panel="panel-chat">Chat</button>
  </div>

  <!-- ── MATCH PANEL ── -->
  <div id="panel-match" class="panel active">
    <button id="analyzeBtn" class="action-btn btn-primary">Analyze Job Description</button>
    <div id="matchStatus" class="status-bar info hidden"></div>
    <div id="matchResult" class="hidden">
      <div class="result-card" style="display:flex;gap:14px;align-items:center">
        <div style="text-align:center;min-width:54px">
          <div class="label">Match</div>
          <div class="score" id="matchScore">—</div>
        </div>
        <div style="flex:1">
          <div class="label">Role</div>
          <div class="value" id="matchRole">—</div>
        </div>
      </div>
      <div class="result-card" style="margin-top:8px">
        <div class="label">Matched Skills</div>
        <div class="tag-list" id="matchedSkills"></div>
        <div class="label" style="margin-top:8px">Gap</div>
        <div id="missingSkill" style="font-size:12.5px;color:#991b1b;margin-top:3px"></div>
      </div>
      <div class="result-card" style="margin-top:8px">
        <div class="label">AI Summary</div>
        <div id="matchSummary" style="font-size:12px;color:#374151;line-height:1.5;margin-top:4px"></div>
      </div>
      <button id="pdfBtn" class="action-btn btn-success" style="margin-top:4px">Generate Tailored PDF Resume</button>
    </div>
  </div>

  <!-- ── AUTOFILL PANEL ── -->
  <div id="panel-autofill" class="panel">
    <div class="status-bar info" style="font-size:11.5px">
      Auto-detects form fields and fills them using your profile + AI. Works on Workday, Greenhouse, Lever, and more.
    </div>
    <button id="autofillBtn" class="action-btn btn-success">Auto-Fill This Application</button>
    <div id="autofillStatus" class="status-bar hidden"></div>
    <div id="progressWrap" class="hidden">
      <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      <div id="progressLabel" style="font-size:11px;color:#666;margin-top:4px;text-align:center"></div>
    </div>
    <div id="fillLog" class="fill-log hidden"></div>
    <hr class="divider">
    <div class="settings-row">
      <label>Backend API URL</label>
      <input type="text" id="apiUrlInput" placeholder="http://127.0.0.1:8000">
    </div>
    <button id="saveApiBtn" class="action-btn btn-outline" style="padding:7px">Save API URL</button>
  </div>

  <!-- ── COVER LETTER PANEL ── -->
  <div id="panel-cover" class="panel">
    <div style="display:flex;flex-direction:column;gap:7px">
      <div class="settings-row">
        <label>Company Name</label>
        <input type="text" id="companyInput" placeholder="Auto-detected from page">
      </div>
      <div class="settings-row">
        <label>Job Role / Title</label>
        <input type="text" id="roleInput" placeholder="Auto-detected from JD">
      </div>
    </div>
    <button id="coverBtn" class="action-btn btn-primary">Generate Cover Letter</button>
    <div id="coverStatus" class="status-bar hidden"></div>
    <div id="coverResult" class="hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:11.5px;font-weight:600;color:#555;">Generated Cover Letter</span>
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>
      <div class="cover-letter-box" id="coverText"></div>
    </div>
  </div>

  <!-- ── CHAT PANEL ── -->
  <div id="panel-chat" class="panel">
    <div id="faqSection">
      <div style="font-size:11px;font-weight:700;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px">Suggested Questions</div>
      <div id="faqList" style="font-size:12px;color:#888">Loading...</div>
    </div>
    <hr class="divider">
    <div id="chat-history">
      <div class="msg bot">I've read this page. What would you like to know?</div>
    </div>
    <div class="input-row">
      <input type="text" id="chatInput" placeholder="Ask about salary, stack, benefits...">
      <button class="send-btn" id="sendChatBtn">➤</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
